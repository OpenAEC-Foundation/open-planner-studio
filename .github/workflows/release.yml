name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ steps.get-version.outputs.version }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Open Planner Studio ${version}`,
              body: `## What's New in ${version}\n\nFree, open-source project planner built with Tauri.\n\n### Downloads\n- **Windows**: Download the \`.exe\` setup file\n- **macOS**: Download the \`.dmg\` file (universal - supports Intel and Apple Silicon)\n- **Linux**: Download the \`.deb\` package or \`.AppImage\``,
              draft: true,
              prerelease: false
            });
            return data.id;

  build-linux-mac:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true

  build-windows:
    needs: [create-release, build-linux-mac]
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # latest.json wordt uitsluitend door de re-sign-stap hieronder beheerd
          # (na Authenticode); voorkomt dat deze run de linux/macos-entries raakt.
          includeUpdaterJson: false

      - name: Sign Windows executables
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}/src-tauri/target/release/bundle/nsis
          files-folder-filter: exe
          files-folder-depth: 1
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-sign updater artifacts after Authenticode signing
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $VERSION = "${{ needs.create-release.outputs.version }}"
          $REPO = "${{ github.repository }}"
          $NSIS_DIR = "$env:GITHUB_WORKSPACE/src-tauri/target/release/bundle/nsis"

          # --- Diagnostics: dump the nsis bundle dir so a future failure shows
          # exactly what Tauri produced (the v2026.6.0 build had NO .nsis.zip here,
          # which is why the old `Get-ChildItem *.nsis.zip` returned $null and
          # `Remove-Item $ZIP.FullName` crashed on a null Path argument).
          Write-Host "=== Contents of $NSIS_DIR ==="
          Get-ChildItem $NSIS_DIR | Select-Object Name | Format-Table -AutoSize | Out-String | Write-Host

          # --- Find the Authenticode-signed installer. This MUST exist; the zip
          # does not have to.
          $EXE = Get-ChildItem "$NSIS_DIR/*-setup.exe" | Select-Object -First 1
          if ($null -eq $EXE) {
            throw "No *-setup.exe found in $NSIS_DIR — cannot build the updater artifact."
          }
          Write-Host "Signed exe: $($EXE.Name)"

          # --- Derive the zip name FROM THE EXE instead of searching for it, so we
          # never depend on a pre-existing .nsis.zip. (e.g. "...x64-setup.exe" ->
          # "...x64-setup.nsis.zip".)
          $ZIP_NAME = $EXE.Name -replace '\.exe$', '.nsis.zip'
          $ZIP_PATH = Join-Path $NSIS_DIR $ZIP_NAME
          if (Test-Path $ZIP_PATH) {
            Remove-Item $ZIP_PATH -Force
          }
          Write-Host "Zip name: $ZIP_NAME"

          # --- Build the .nsis.zip around the signed exe. Use the ZipFile API with
          # CompressionLevel.Optimal (Deflate): Compress-Archive can emit Deflate64,
          # which Tauri's updater cannot decompress. Entry name MUST be the exe's
          # bare filename — that's what the updater extracts and runs.
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::Open($ZIP_PATH, 'Create')
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($archive, $EXE.FullName, $EXE.Name, [System.IO.Compression.CompressionLevel]::Optimal)
          $archive.Dispose()
          Write-Host "Built zip: $ZIP_PATH"

          # --- Generate the updater signature for the rebuilt zip.
          # tauri signer sign writes a .sig file next to the input file.
          npx tauri signer sign "$ZIP_PATH" --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          # Read the freshly generated .sig file (the updater `signature` field is
          # the *contents* of the .sig, not a path or URL).
          $ZIP_SIG = (Get-Content "$ZIP_PATH.sig" -Raw).Trim()
          Write-Host "New zip signature: $($ZIP_SIG.Substring(0, [Math]::Min(50, $ZIP_SIG.Length)))..."

          # --- Upload the rebuilt updater artifacts plus the signed installer.
          # (The signed setup.exe is uploaded for humans who download directly.)
          gh release upload $VERSION "$ZIP_PATH" "$ZIP_PATH.sig" "$($EXE.FullName)" --clobber --repo "$REPO"

          # --- Resolve the REAL download URL via the API. GitHub rewrites spaces in
          # asset names to dots (e.g. "Open Planner Studio_..." -> "Open.Planner.Studio_..."),
          # so hand-building the URL from $ZIP_NAME would 404. The `url` field of
          # `gh release view --json assets` is the browser download URL with the
          # already-rewritten name.
          $assets = (gh release view $VERSION --repo "$REPO" --json assets | ConvertFrom-Json).assets
          $zipAsset = $assets | Where-Object { $_.name -like '*.nsis.zip' } | Select-Object -First 1
          $ZIP_URL = $zipAsset.url
          if ([string]::IsNullOrEmpty($ZIP_URL)) {
            # Fallback: mimic GitHub's space->dot rewrite manually if the API lookup
            # somehow came back empty.
            $rewritten = $ZIP_NAME -replace ' ', '.'
            $ZIP_URL = "https://github.com/$REPO/releases/download/$([uri]::EscapeDataString($VERSION))/$rewritten"
            Write-Host "API lookup empty — using fallback URL"
          }
          Write-Host "Zip URL: $ZIP_URL"

          # --- Patch latest.json. build-linux-mac already uploaded one with the
          # linux + macos entries; build-windows's own tauri-action run also merged
          # a latest.json, but its Windows signatures predate the Authenticode
          # re-signing and are stale. We SET both Windows keys authoritatively here.
          gh release download $VERSION --pattern "latest.json" --output latest.json --clobber --repo "$REPO"

          $latest = Get-Content latest.json -Raw | ConvertFrom-Json
          if ($null -eq $latest.platforms) {
            $latest | Add-Member -NotePropertyName platforms -NotePropertyValue ([pscustomobject]@{}) -Force
          }

          # Tauri's runtime resolves "windows-x86_64-nsis" first and falls back to
          # "windows-x86_64", so both must carry the zip. Linux/macOS untouched.
          $winEntry = [pscustomobject]@{ signature = $ZIP_SIG; url = $ZIP_URL }
          foreach ($key in @('windows-x86_64', 'windows-x86_64-nsis')) {
            $latest.platforms | Add-Member -NotePropertyName $key -NotePropertyValue $winEntry -Force
            Write-Host "Set $key -> $ZIP_URL (zip signature)"
          }

          $latest | ConvertTo-Json -Depth 10 | Set-Content latest.json -NoNewline
          gh release upload $VERSION latest.json --clobber --repo "$REPO"

          Write-Host "Windows updater entries set to the .nsis.zip with matching signature"

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-linux-mac, build-windows]

    steps:
      - name: Publish release
        id: publish-release
        uses: actions/github-script@v8
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            });
