name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        default: 'v0.1.0'

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ steps.get-version.outputs.version }}';
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `Open Planner Studio ${version}`,
              body: `## What's New in ${version}\n\nFree, open-source project planner built with Tauri.\n\n### Downloads\n- **Windows**: Download the \`.exe\` setup file\n- **macOS**: Download the \`.dmg\` file (universal - supports Intel and Apple Silicon)\n- **Linux**: Download the \`.deb\` package or \`.AppImage\``,
              draft: true,
              prerelease: false
            });
            return data.id;

  build-linux-mac:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust targets (macOS universal)
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true

  build-windows:
    needs: [create-release, build-linux-mac]
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}

      - name: Sign Windows executables
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.AZURE_CERTIFICATE_PROFILE_NAME }}
          files-folder: ${{ github.workspace }}/src-tauri/target/release/bundle/nsis
          files-folder-filter: exe
          files-folder-depth: 1
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Re-sign updater artifacts after Authenticode signing
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $VERSION = "${{ needs.create-release.outputs.version }}"
          $NSIS_DIR = "$env:GITHUB_WORKSPACE/src-tauri/target/release/bundle/nsis"

          $EXE = Get-ChildItem "$NSIS_DIR/*-setup.exe" | Select-Object -First 1
          $ZIP = Get-ChildItem "$NSIS_DIR/*.nsis.zip" | Select-Object -First 1

          Write-Host "Signed exe: $($EXE.Name)"
          Write-Host "Old zip: $($ZIP.Name)"

          # The Windows updater artifact is the .nsis.zip — Tauri's updater
          # downloads that archive, unzips it, and runs the contained setup.exe.
          # No latest.json key ever points at a raw .exe, so we only need a fresh
          # updater signature for the zip. The signed setup.exe is still uploaded
          # below for humans who download the installer directly.

          # Re-create .nsis.zip around the Authenticode-signed exe.
          # Use the ZipFile API with Deflate/Optimal compression: Compress-Archive
          # can emit Deflate64, which Tauri's updater cannot decompress.
          $ZIP_PATH = $ZIP.FullName
          Remove-Item $ZIP_PATH
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::Open($ZIP_PATH, 'Create')
          [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile($archive, $EXE.FullName, $EXE.Name, [System.IO.Compression.CompressionLevel]::Optimal)
          $archive.Dispose()

          # Re-generate the updater signature for the rebuilt zip.
          # tauri signer sign writes a .sig file next to the input file.
          npx tauri signer sign "$($ZIP.FullName)" --private-key "$env:TAURI_SIGNING_PRIVATE_KEY" --password "$env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD"

          # Read the freshly generated .sig file (the updater `signature` field is
          # the *contents* of the .sig, not a path or URL).
          $ZIP_SIG = (Get-Content "$($ZIP.FullName).sig" -Raw).Trim()

          Write-Host "New zip signature: $($ZIP_SIG.Substring(0, 50))..."

          # Build the .nsis.zip download URL for this release.
          $REPO = "${{ github.repository }}"
          $ZIP_URL = "https://github.com/$REPO/releases/download/$([uri]::EscapeDataString($VERSION))/$($ZIP.Name)"
          Write-Host "Zip URL: $ZIP_URL"

          # Download the latest.json that build-linux-mac already uploaded
          # (contains the linux + macos entries). build-windows's own tauri-action
          # run also writes a latest.json (includeUpdaterJson defaults to true in
          # action-v0.6.1) and merges into this same file, but its Windows
          # signatures were generated BEFORE Authenticode re-signing, so they are
          # stale. We therefore SET both Windows keys authoritatively here rather
          # than relying on that merge.
          gh release download $VERSION --pattern "latest.json" --output latest.json --clobber --repo "$REPO"

          $latest = Get-Content latest.json -Raw | ConvertFrom-Json
          if ($null -eq $latest.platforms) {
            $latest | Add-Member -NotePropertyName platforms -NotePropertyValue ([pscustomobject]@{}) -Force
          }

          # Add-or-overwrite both Windows updater keys with the rebuilt zip's
          # url + signature. Tauri's runtime resolves "windows-x86_64-nsis" first
          # and falls back to "windows-x86_64", so both must carry the zip.
          # Linux/macOS entries are left untouched.
          $winEntry = [pscustomobject]@{ signature = $ZIP_SIG; url = $ZIP_URL }
          foreach ($key in @('windows-x86_64', 'windows-x86_64-nsis')) {
            $latest.platforms | Add-Member -NotePropertyName $key -NotePropertyValue $winEntry -Force
            Write-Host "Set $key -> $ZIP_URL (zip signature)"
          }

          $latest | ConvertTo-Json -Depth 10 | Set-Content latest.json -NoNewline

          # Re-upload the rebuilt updater artifacts plus the patched latest.json.
          # The signed setup.exe is uploaded for direct downloads; it has no
          # updater .sig (it is not an updater artifact).
          gh release upload $VERSION "$($EXE.FullName)" --clobber --repo "$REPO"
          gh release upload $VERSION "$($ZIP.FullName)" --clobber --repo "$REPO"
          gh release upload $VERSION "$($ZIP.FullName).sig" --clobber --repo "$REPO"
          gh release upload $VERSION latest.json --clobber --repo "$REPO"

          Write-Host "Windows updater entries set to the .nsis.zip with matching signature"

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-linux-mac, build-windows]

    steps:
      - name: Publish release
        id: publish-release
        uses: actions/github-script@v8
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            });
