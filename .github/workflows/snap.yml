name: Build Snap Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Bestaande release-tag om tegen te bouwen (test)'
        required: true
        default: 'v2026.6.0'

jobs:
  build-snap:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      # Job-level zodat de gated publish-stap er in `if:` naar kan verwijzen.
      SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}

    steps:
      - uses: actions/checkout@v5

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_number=${VERSION#v}" >> "$GITHUB_OUTPUT"

      # We bouwen de Tauri-app NIET opnieuw: de snap herverpakt de deb van de
      # gepubliceerde GitHub-release (zelfde artifact als de overige Linux-downloads).
      # Bij een tag-push draait release.yml gelijktijdig, dus wachten we tot de
      # deb-asset bestaat.
      - name: Wait for release deb and download it
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          echo "Wachten op deb-asset van release $VERSION..."
          found=""
          for i in $(seq 1 60); do
            if gh release view "$VERSION" --json assets --jq '.assets[].name' 2>/dev/null | grep -q '_amd64\.deb$'; then
              found=1
              echo "deb-asset gevonden"
              break
            fi
            echo "nog geen deb-asset... (poging $i/60)"
            sleep 30
          done
          if [ -z "$found" ]; then
            echo "::error::deb-asset voor $VERSION verscheen niet op tijd"
            exit 1
          fi
          gh release download "$VERSION" -p '*_amd64.deb' --clobber --dir .
          deb=$(ls *_amd64.deb | head -1)
          cp "$deb" open-planner-studio.deb
          echo "Gebruik $deb -> open-planner-studio.deb"

      - name: Set version in snapcraft.yaml
        run: |
          sed -i "s/^version: .*/version: '${{ steps.get-version.outputs.version_number }}'/" snap/snapcraft.yaml
          grep '^version:' snap/snapcraft.yaml

      - name: Build snap
        uses: snapcore/action-build@v1
        id: snapcraft

      # Tag-push: snap als asset aan de echte release hangen.
      - name: Upload snap to GitHub release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.get-version.outputs.version }}" \
            "${{ steps.snapcraft.outputs.snap }}" --clobber

      # Handmatige test: snap als CI-artifact (de release NIET aanraken).
      - name: Upload snap as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: open-planner-studio-snap
          path: ${{ steps.snapcraft.outputs.snap }}
          if-no-files-found: error

      # Live publiceren naar de Snap Store: alleen op een echte release én pas
      # zodra het store-credentials-secret bestaat (eigenaar-stap).
      - name: Publish to Snap Store
        if: github.event_name == 'push' && env.SNAPCRAFT_STORE_CREDENTIALS != ''
        uses: snapcore/action-publish@v1
        with:
          snap: ${{ steps.snapcraft.outputs.snap }}
          release: stable
